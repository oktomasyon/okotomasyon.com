        <article>
            <h1>OK Otomasyon — Sera Sulama ve Gübreleme Makineleri, Sera İklimlendirme Sistemleri, Sera Otomasyon</h1>
            <p>2000 yılından beri sera otomasyonu, sulama ve gübreleme makineleri, sera iklimlendirme sistemleri ve
                AgriNexus SCADA yazılımı üretiyoruz. Antalya merkezli mühendislik firmamız Türkiye ve 7 ülkede anahtar
                teslim sera projeleri sunmaktadır. Akıllı sera çözümleri, bilgisayar kontrollü sulama ve gübreleme,
                uzaktan sera izleme ve kontrol sistemleri konusunda uzmanız.</p>

            <h2>Sera Sulama ve Gübreleme Makineleri</h2>
            <p>Sera sulama makinesi ve sera gübreleme makinesi üretimi. Bilgisayar kontrollü sulama, bilgisayar
                kontrollü
                gübreleme, EC/pH dozlama ve drenaj kontrol ile entegre çalışan profesyonel sulama ve gübreleme
                makineleri.</p>

            <h3>MİNİMİX — Kompakt Sulama ve Gübreleme Makinesi</h3>
            <p>Saatte 2 barda 30m³ sulama kapasitesi, 2+1 kanallı EC/pH dozajlama sistemi, krom pompa ve gövde, bypass
                bağlantı. Küçük ve orta ölçekli seralar için ideal kompakt sulama makinesi. Damla sulama otomasyonu,
                gübre dozlama ve gübre karıştırma sistemi dahil. Fiyat: ₺220.182</p>

            <h3>PROMİX — Profesyonel Sulama ve Gübreleme Makinesi</h3>
            <p>Saatte 2 barda 85m³ sulama kapasitesi, 4+1 kanallı dozajlama, tam krom gövde, bypass ve mix bağlantı.
                Profesyonel sera işletmeleri için sulama ve gübreleme makinesi. EC kontrol, pH kontrol, drenaj ölçüm
                ve bitki besleme sistemi entegrasyonu. Fiyat: ₺317.061</p>

            <h3>PROMAX — Endüstriyel Sulama ve Gübreleme Makinesi</h3>
