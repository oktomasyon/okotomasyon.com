            <h1>OK Otomasyon — Sera Sulama ve Gübreleme Makineleri, Sera İklimlendirme Sistemleri</h1>
            <p>2000 yılından beri sera otomasyonu, sulama ve gübreleme makineleri, sera iklimlendirme sistemleri ve
                AgriNexus SCADA yazılımı üretiyoruz. Antalya merkezli mühendislik firmamız Türkiye ve 7 ülkede anahtar
                teslim sera projeleri sunmaktadır.</p>

            <h2>Sulama ve Gübreleme Makineleri</h2>
            <h3>MİNİMİX — Kompakt Sulama ve Gübreleme Makinesi</h3>
            <p>Saatte 2 barda 30m³ sulama kapasitesi, 2+1 kanallı EC/pH dozajlama sistemi, krom pompa ve gövde, bypass
                bağlantı. Küçük ve orta ölçekli seralar için ideal kompakt sulama makinesi. Fiyat: $3.990</p>

            <h3>PROMİX — Profesyonel Sulama ve Gübreleme Makinesi</h3>
            <p>Saatte 2 barda 85m³ sulama kapasitesi, 4+1 kanallı dozajlama, tam krom gövde, bypass ve mix bağlantı.
                Profesyonel sera işletmeleri için sulama ve gübreleme makinesi. Fiyat: $6.750</p>

            <h3>PROMAX — Endüstriyel Sulama ve Gübreleme Makinesi</h3>
            <p>Yüksek kapasiteli endüstriyel sulama makinesi. Tam krom yapı, SCADA entegre kontrol, bypass + mix + çoklu
                hat bağlantısı. Fiyat: $8.550</p>

            <h3>ALP 2017 — Amiral Gemisi Sulama ve Gübreleme Sistemi</h3>
            <p>En üst seviye endüstriyel sulama ve gübreleme sistemi. AgriNexus SCADA ile tam entegre uzaktan izleme.
                Proje bazlı büyük ölçekli sera çözümü. Fiyat: $18.000</p>

            <h2>AgriNexus SCADA — Sera Otomasyon Yazılımı</h2>
            <p>AgriNexus SCADA sera otomasyon yazılımı: anlık iklim izleme (sıcaklık, nem, CO₂, rüzgar), zone bazlı
                sulama ve gübreleme kontrolü, EC/pH dozlama, sınırsız sera ve sektör desteği, yapay zeka destekli
                kararlar, uzaktan erişim, otomatik raporlama.</p>

            <h2>Sera İklimlendirme Sistemleri</h2>
            <p>Flexem HMI dokunmatik ekran ve Delta PLC kontrollü sera iklimlendirme sistemleri. 1 sektörden 6 sektöre
                kadar modüler yapı. Sera ısıtma kontrolü, sera havalandırma sistemleri, sera perdeleme, sera
                nemlendirme, pad-fan soğutma sistemi.</p>
            <ul>
                <li>1 Sektörlü Sera İklimlendirme Sistemi — $4.200</li>
                <li>2 Sektörlü Sera İklimlendirme Sistemi — $5.000</li>
                <li>3 Sektörlü Sera İklimlendirme Sistemi — $7.250</li>
                <li>4 Sektörlü Sera İklimlendirme Sistemi — $8.850</li>
                <li>5 Sektörlü Sera İklimlendirme Sistemi — $10.500</li>
                <li>6 Sektörlü Sera İklimlendirme Sistemi — $12.000</li>
            </ul>

            <p>Kendi Ar-Ge ve üretim. Anahtar teslim sera projeleri. Delta PLC ve Flexem HMI teknolojisi. 25 yılı aşkın
