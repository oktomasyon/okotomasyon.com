<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>OK Otomasyon</title>
    <script>
        // Eski URL'leri ana sayfaya yönlendir
        // /sulama-makineleri, /urunler vs. -> index.html
        var path = window.location.pathname;
        var hash = '';
        if (path.includes('sulama') || path.includes('urunler') || path.includes('products')) {
            hash = '#urunler';
        } else if (path.includes('hakkimizda') || path.includes('about')) {
            hash = '#hakkimizda';
        } else if (path.includes('iletisim') || path.includes('contact')) {
            hash = '#iletisim';
        } else if (path.includes('iklimlendirme') || path.includes('climate')) {
            hash = '#iklimlendirme';
        } else if (path.includes('agrinexus')) {
            hash = '#agrinexus';
        }
        window.location.replace('/' + hash);
    </script>
</head>

<body>
    <p>Yönlendiriliyorsunuz...</p>
</body>

</html>
